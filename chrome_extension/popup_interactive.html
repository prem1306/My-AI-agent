<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Agent — Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            background: #0f0f1a;
            color: #e2e2e2;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            padding: 12px 16px;
            border-bottom: 1px solid #2d2d4e;
            display: flex; align-items: center; gap: 10px;
            flex-shrink: 0;
        }
        .header-icon { font-size: 22px; }
        .header-info { flex: 1; }
        .header-info h1 { font-size: 15px; font-weight: 700; color: #fff; }
        .header-info p  { font-size: 11px; color: #6a9955; margin-top: 1px; }
        .header-status {
            width: 8px; height: 8px; border-radius: 50%;
            background: #4ade80; box-shadow: 0 0 6px #4ade80;
        }
        .header-status.offline { background: #f87171; box-shadow: 0 0 6px #f87171; }

        /* Agent Switcher */
        .agent-tab-bar {
            display: flex; gap: 0;
            background: #1a1a2e;
            border-bottom: 1px solid #2d2d4e;
            flex-shrink: 0;
        }
        .agent-tab {
            flex: 1; padding: 8px 4px;
            border: none; background: transparent;
            color: #888; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            border-bottom: 2px solid transparent;
            letter-spacing: 0.3px;
        }
        .agent-tab:hover { color: #ccc; }
        .agent-tab.active { color: #7ec8e3; border-bottom-color: #4285F4; }

        /* Translation Language Bar */
        #translate-bar {
            display: none; padding: 8px 14px;
            background: #16213e; border-bottom: 1px solid #2d2d4e;
            flex-shrink: 0;
        }
        #translate-bar select {
            background: #2d2d4e; border: 1px solid #3d3d6e;
            color: #e2e2e2; border-radius: 6px;
            padding: 4px 10px; font-size: 12px; cursor: pointer;
        }
        #translate-bar label { font-size: 12px; color: #888; margin-right: 8px; }

        /* ── Chat ── */
        #chat-history {
            flex: 1; overflow-y: auto;
            padding: 16px; display: flex;
            flex-direction: column; gap: 10px;
        }

        .message {
            max-width: 88%; padding: 10px 14px;
            border-radius: 14px; line-height: 1.6;
            font-size: 13px; word-break: break-word;
            animation: msgIn 0.2s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1e3a6e, #2a4a8e);
            color: #c8d8ff;
            border-bottom-right-radius: 4px;
        }
        .message.agent {
            align-self: flex-start;
            background: #1a1a2e; border: 1px solid #2d2d4e;
            color: #d4d4d4;
            border-bottom-left-radius: 4px;
        }
        .message.agent ul { padding-left: 16px; }
        .message.agent li { margin-bottom: 3px; }
        .message.agent h4 { color: #7ec8e3; margin: 6px 0 3px; font-size: 13px; }
        .message.agent code {
            background: #2d2d4e; padding: 1px 5px;
            border-radius: 4px; font-family: monospace; font-size: 12px;
        }
        .message-label {
            font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; color: #555; margin-bottom: 2px;
        }

        /* Loading */
        .loading-dots {
            display: flex; gap: 5px; align-items: center; padding: 4px 0;
        }
        .loading-dots span {
            width: 7px; height: 7px; border-radius: 50%;
            background: #4285F4; animation: dotPulse 1.2s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40%            { opacity: 1;   transform: scale(1); }
        }

        /* ── Input ── */
        .input-area {
            padding: 10px 12px;
            border-top: 1px solid #2d2d4e;
            display: flex; gap: 8px; align-items: flex-end;
            background: #1a1a2e; flex-shrink: 0;
        }
        #user-input {
            flex: 1;
            padding: 9px 14px;
            background: #16213e;
            border: 1px solid #2d2d4e;
            border-radius: 20px; outline: none;
            font-family: inherit; font-size: 13px; color: #e2e2e2;
            resize: none; max-height: 80px;
            transition: border-color 0.2s;
        }
        #user-input:focus { border-color: #4285F4; }
        #user-input::placeholder { color: #555; }
        #send-btn {
            background: linear-gradient(135deg, #4285F4, #7c3aed);
            border: none; border-radius: 50%; width: 36px; height: 36px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: opacity 0.2s;
        }
        #send-btn:disabled { opacity: 0.4; cursor: default; }
        #send-btn:hover:not(:disabled) { opacity: 0.85; }

        /* Clear btn */
        .clear-btn {
            background: none; border: none; color: #555;
            font-size: 11px; cursor: pointer; padding: 2px 6px;
            border-radius: 4px; transition: color 0.2s;
        }
        .clear-btn:hover { color: #f87171; }

        /* Scrollbar */
        #chat-history::-webkit-scrollbar { width: 4px; }
        #chat-history::-webkit-scrollbar-track { background: transparent; }
        #chat-history::-webkit-scrollbar-thumb { background: #2d2d4e; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-icon">🤖</span>
        <div class="header-info">
            <h1>AI Agent Chat</h1>
            <p id="context-hint">Select an agent below to begin</p>
        </div>
        <div class="header-status" id="header-status"></div>
    </div>

    <div class="agent-tab-bar">
        <button class="agent-tab active" data-agent="coordinator" data-endpoint="chat">🧠 Chat</button>
        <button class="agent-tab" data-agent="explain" data-endpoint="explain">✨ Explain</button>
        <button class="agent-tab" data-agent="summarize" data-endpoint="summarize">📋 Summarize</button>
        <button class="agent-tab" data-agent="translate" data-endpoint="translate">🌐 Translate</button>
    </div>

    <div id="translate-bar">
        <label for="lang-select">Target Language:</label>
        <select id="lang-select">
            <option value="spanish">Spanish</option>
            <option value="french">French</option>
            <option value="german">German</option>
            <option value="hindi">Hindi</option>
            <option value="japanese">Japanese</option>
            <option value="chinese">Chinese</option>
            <option value="arabic">Arabic</option>
            <option value="portuguese">Portuguese</option>
            <option value="russian">Russian</option>
            <option value="korean">Korean</option>
            <option value="italian">Italian</option>
            <option value="english">English</option>
        </select>
    </div>

    <div id="chat-history"></div>

    <div class="input-area">
        <textarea id="user-input" placeholder="Type a message or paste text..." rows="1"></textarea>
        <button id="send-btn">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z"/>
            </svg>
        </button>
    </div>

    <script src="popup_interactive.js"></script>
</body>
</html>
